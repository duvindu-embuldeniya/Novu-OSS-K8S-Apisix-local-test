apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: django-ingress
  namespace: dev
  annotations:
    kubernetes.io/ingress.global-static-ip-name: k8s-test
    kubernetes.io/ingress.class: "gce"
    networking.gke.io/managed-certificates: django-mc
spec:
  rules:
  - host: duvindu.org
    http:
      paths:
      - path: /*
        pathType: ImplementationSpecific
        backend:
          service:
            name: django-svc
            port:
              number: 8000
  - host: www.duvindu.org
    http:
      paths:
      - path: /*
        pathType: ImplementationSpecific
        backend:
          service:
            name: django-svc
            port:
              number: 8000
  - host: apisix.duvindu.org
    http:
      paths:
      - path: /*
        pathType: ImplementationSpecific
        backend:
          service:
            name: apisix-gateway
            port:
              number: 80
  - host: novu.duvindu.org
    http:
      paths:
      - path: /*
        pathType: ImplementationSpecific
        backend:
          service:
            name: apisix-gateway
            port:
              number: 80