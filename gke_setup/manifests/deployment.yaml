apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-deployment
  namespace: dev
  labels:
    app: django
  annotations:
    "kubernetes.io/change-cause": "Initial State"
spec:
  replicas: 2
  selector: 
    matchLabels: 
      app: django 
  template:
    metadata:
      labels:
        app: django 
    spec:
      containers:
      - name: django-container
        image: duvindune/backend:latest
        ports:
          - containerPort: 8000

        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"